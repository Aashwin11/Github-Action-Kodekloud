name: Matrix
on: push


jobs:

    matrix-deploy:
        strategy:
          matrix:
            os: [ubuntu-latest, windows-latest]
            images: [hello-world, alpine]
        runs-on: ${{matrix.os}}

        steps:
            - name: Docker info
              run: docker info

            - name: Docker Run on ${{matrix.os}}
              run: docker run ${{matrix.images}}
              


